<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>8인 실시간 경매</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="login-area" class="box">
        <h2>경매 시스템</h2>
        <div style="margin-bottom: 15px;">
            <input type="checkbox" id="isAdminCheck" onchange="document.getElementById('p-form').style.display = this.checked ? 'none' : 'block'; document.getElementById('a-form').style.display = this.checked ? 'block' : 'none';"> 
            <label for="isAdminCheck">방장 접속</label>
        </div>
        <div id="p-form"><input type="text" id="nick" placeholder="닉네임"></div>
        <div id="a-form" style="display:none;"><input type="password" id="pw" placeholder="방장 비밀번호 입력"></div>
        <button onclick="enter()" style="margin-top:15px; padding:10px 30px;">입장</button>
    </div>

    <div id="auction-area" class="box" style="display:none;">
        <div class="item-title" id="itemTitle">경매 준비 중</div>
        
        <div class="timer" id="timer">00</div>
        
        <div class="current-bid-box">
            현재 최고가: <strong id="curBid">0</strong><br>
            <span style="font-size: 0.8em;">(입찰자: <span id="curWinner">-</span>)</span>
        </div>

        <div id="players-grid"></div>

        <div id="user-ui" style="margin-top:20px;">
            <div class="quick-bid-row">
                <button class="q-btn" onclick="add(5)">+5</button>
                <button class="q-btn" onclick="add(10)">+10</button>
                <button class="q-btn" onclick="add(100)">+100</button>
                <button class="q-btn" onclick="document.getElementById('bidInput').value='0'">0</button>
            </div>
            <input type="number" id="bidInput" placeholder="금액">
            <button id="bidBtn" onclick="sendBid()">입찰하기</button>
        </div>

        <div id="admin-ui" class="admin-box">
            <div style="margin-bottom: 15px;">
                <select id="itemSelect" style="padding: 10px; border-radius: 6px;">
                    <script>
                        // 서버에 적은 것과 똑같은 이름 배열을 여기에 복사해 줍니다.
                        const customItems = [
                            "수아", "비앙카", "혜진", "일레븐", 
   				 "바냐", "띠아", "샬럿", "마르티나", 
    				"리오", "니아", "로지", "슈린", 
    				"시셀라", "엠마", "유스티나", "실비아"
                        ];
                        customItems.forEach(item => {
                            document.write(`<option value="${item}">${item}</option>`);
                        });
                    </script>
                </select>
                <button class="admin-btn" style="padding: 10px 15px; font-size: 0.9em; background: #34495e;" onclick="selectItem()">매물 확정</button>
            </div>
            
            <button class="admin-btn" onclick="startNextAuction()">경매 시작</button>
            <button class="admin-btn skip-btn" onclick="skipCurrentAuction()">현재 라운드 스킵</button>
            
            <div style="margin-top: 20px; border-top: 1px solid #eee; padding-top: 15px; display: flex; justify-content: space-between;">
                <button class="admin-btn" style="background: #e67e22; width: 48%; font-size: 1em;" onclick="kickPlayer()">유저 강퇴</button>
                <button class="admin-btn" style="background: #c0392b; width: 48%; font-size: 1em;" onclick="resetSystem()">전체 초기화 (위험)</button>
            </div>
        </div>
    </div>

    <div id="messages" class="box"></div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="client.js"></script>
</body>
</html>
